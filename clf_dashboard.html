<style>

<script>
// ГўвЂќв‚¬ГўвЂќв‚¬ Secret Гўв‚¬вЂќ must match DASHBOARD_SECRET in graph.py ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
const SECRET = "DstatCLF_2026_xK9mZ7";

const PIE_COLORS = ['#6366f1','#22d3ee','#f59e0b','#ec4899','#84cc16','#f97316','#06b6d4','#8b5cf6','#10b981','#ef4444'];

function fmt(n){ return Number(n).toLocaleString(); }
function pct(n,t){ return t?(n/t*100).toFixed(1)+'%':'0%'; }
function parsePairs(arr){
  if(!Array.isArray(arr)) return [];
  return arr.map(s=>{
    const i=s.lastIndexOf('-');
    return {label:s.slice(0,i),value:+s.slice(i+1)||0};
  }).filter(x=>x.label);
}
function flag(cc){
  if(!cc||cc.length<2) return 'Г°ЕёЕ’Вђ';
  return [...cc.toUpperCase().slice(0,2)].map(c=>String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)).join('');
}
function showError(msg){
  document.getElementById('loader').style.display='none';
  const b=document.getElementById('error-box');
  b.style.display='block';
  b.innerHTML=`<div style="font-size:30px;margin-bottom:10px">ГўЕЎВ ГЇВёВЏ</div><div>${msg}</div>`;
}

// ГўвЂќв‚¬ГўвЂќв‚¬ HMAC-SHA256 verify (first 16 hex chars) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
async function verifyHMAC(data, expectedSig){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey(
    'raw',enc.encode(SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const buf=await crypto.subtle.sign('HMAC',key,enc.encode(data));
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
  return hex===expectedSig;
}

// ГўвЂќв‚¬ГўвЂќв‚¬ Main ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
(async()=>{
  try{
    const params=new URLSearchParams(location.search);
    const d=params.get('d'), s=params.get('s');
    if(!d||!s){ showError('Missing data parameters.'); return; }

    const ok=await verifyHMAC(d,s);
    if(!ok){ showError('ГўЕЎВ ГЇВёВЏ Invalid or tampered data.<br>This link cannot be modified.'); return; }

    // base64url ГўвЂ вЂ™ JSON
    const pad=(4-d.length%4)%4;
    const D=JSON.parse(atob(d.replace(/-/g,'+').replace(/_/g,'/')+'='.repeat(pad)));

    document.getElementById('loader').style.display='none';
    const app=document.getElementById('app');
    app.style.display='block';

    const sv=D.sv||'Server', date=D.date||'', user=D.user||'User',
          fname=D.fname||user, uid=D.uid||'',
          total=+D.total||0, allowed=+D.allowed||0,
          bypassed=+D.bypassed||0, blocked=+D.blocked||0,
          uip=+D.uip||0, bip=+D.bip||0;

    const methods=parsePairs(D.methods), protocols=parsePairs(D.protocols),
          nations=parsePairs(D.nations), sources=parsePairs(D.sources),
          actions=parsePairs(D.actions);

    const topCC=nations[0]?.label||'', topCnt=nations[0]?.value||0;

    // ГўвЂќв‚¬ГўвЂќв‚¬ HTML ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
    app.innerHTML=`
<div class="card header-card" style="margin-bottom:14px">

  <div class="header-info">

    <div class="uname">@${user}</div>

</div>

<div class="stat-card" style="margin-bottom:14px;padding:18px 20px">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
    <div>
      <div class="stat-label" style="font-size:13px">Г°ЕёвЂњЕ  Total Requests</div>
      <div class="stat-value" style="font-size:34px">${fmt(total)}</div>
    </div>
    <div style="text-align:right;font-size:12px">
      <span style="color:#22c55e">ГўвЂ”ВЏ ${pct(allowed,total)}</span>
      <span style="color:#3b82f6;margin:0 6px">ГўвЂ”ВЏ ${pct(bypassed,total)}</span>
      <span style="color:#ef4444">ГўвЂ”ВЏ ${pct(blocked,total)}</span>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-seg green" style="width:${pct(allowed,total)}"></div>
    <div class="progress-seg blue"  style="width:${pct(bypassed,total)}"></div>
    <div class="progress-seg red"   style="width:${pct(blocked,total)}"></div>
  </div>
  <div style="display:flex;justify-content:flex-end;font-size:10px;color:#9ca3af;margin-top:4px;gap:10px">
    <span>ГўвЂ”ВЏ Allowed</span><span>ГўвЂ”ВЏ Bypassed</span><span>ГўвЂ”ВЏ Blocked</span>
  </div>
</div>

<div class="grid3" style="margin-bottom:14px">
  <div class="stat-card">
    <div class="stat-label">ГўЕЎВЎ Normal Requests</div>
    <div class="stat-value" style="font-size:24px">${fmt(allowed)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Г°ЕёвЂќвЂ™ Firewall Events</div>
    <div class="stat-value orange">${fmt(blocked)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">ГўвЂ вЂ™ Bypassed</div>
    <div class="stat-value" style="font-size:24px">${fmt(bypassed)}</div>
  </div>
</div>

<div class="grid3" style="margin-bottom:14px">
  <div class="stat-card" style="background:#f0fdf4">
    <div class="stat-label" style="font-size:12px;font-weight:700;color:#15803d">Г°ЕёвЂњЕ  IP Statistics</div>
    <div class="ip-grid">
      <div class="ip-item"><div class="lbl">ГўЕЎвЂ“ГЇВёВЏ Unique IP</div><div class="val green">${fmt(uip)}</div></div>
      <div class="ip-item"><div class="lbl">Г°ЕёвЂєВЎ Allowed IPs</div><div class="val green">${fmt(Math.max(0,uip-bip))}</div></div>
      <div class="ip-item"><div class="lbl">ГўЕЎВ ГЇВёВЏ Blocked IPs</div><div class="val red">${fmt(bip)}</div></div>
      <div class="ip-item"><div class="lbl">Г°ЕёвЂќвЂ™ Bypassed IPs</div><div class="val orange">0</div></div>
    </div>
  </div>
  <div class="traffic-card" style="background:#fffbeb">
    <div class="stat-label" style="font-size:12px;font-weight:700;color:#92400e">Г°ЕёвЂњЕ  Traffic Statistics</div>
    <div class="progress-bar" style="margin-top:8px">
      <div class="progress-seg green" style="width:${pct(allowed,total)}"></div>
      <div class="progress-seg red"   style="width:${pct(blocked,total)}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;font-size:11px">
      <div><span style="color:#22c55e">ГўвЂ”ВЏ Allowed</span><br><b>${fmt(allowed)}</b><br><span style="color:#9ca3af">${pct(allowed,total)}</span></div>
      <div><span style="color:#ef4444">ГўвЂ”ВЏ Blocked</span><br><b>${fmt(blocked)}</b><br><span style="color:#9ca3af">${pct(blocked,total)}</span></div>
      <div><span style="color:#3b82f6">ГўвЂ”ВЏ Bypassed</span><br><b>${fmt(bypassed)}</b><br><span style="color:#9ca3af">${pct(bypassed,total)}</span></div>
      <div><span style="color:#f59e0b">ГўвЂ”ВЏ Total</span><br><b>${fmt(total)}</b><br><span style="color:#9ca3af">100%</span></div>

  </div>
  <div class="stat-card" style="background:#f0f9ff">
    <div class="stat-label" style="font-size:12px;font-weight:700;color:#0369a1">Г°ЕёВҐВ§ Traffic Distribution</div>
    <div style="font-size:11px;color:#6b7280;margin-top:8px">Top Country:</div>
    <div style="font-size:13px;font-weight:600;margin-top:3px">${topCC?flag(topCC)+' '+topCC:'Гўв‚¬вЂќ'}</div>
    <div style="font-size:11px;color:#9ca3af;margin-top:4px">${pct(topCnt,uip||1)}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#6b7280">
      <span>Requests: <b>${fmt(topCnt)}</b></span>
      <span>Total: ${fmt(total)}</span>

  </div>
</div>

    function makePie(cid, lid, data){
      const tot=data.reduce((s,d)=>s+d.value,0)||1;
      const ctx=document.getElementById(cid)?.getContext('2d');
      if(!ctx) return;
      new Chart(ctx,{
        type:'doughnut',
        data:{labels:data.map(d=>d.label),datasets:[{
          data:data.map(d=>d.value),
          backgroundColor:PIE_COLORS.slice(0,data.length),
          borderWidth:2,borderColor:'#fff'
        }]},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString()} (${pct(c.parsed,tot)})`}}
          },
          cutout:'58%'
        }
      });
      const leg=document.getElementById(lid);
      if(leg) data.forEach((d,i)=>{
        leg.innerHTML+=`<span class="leg-item"><span class="leg-dot" style="background:${PIE_COLORS[i]};display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>${d.label}: ${pct(d.value,tot)}</span>`;
      });
    }

    const srcData=sources.map(s=>({
      label:s.label==='l7ddos'?'HTTP DDoS':s.label==='firewallManaged'?'Managed Rules':s.label==='pass'?'Allowed':s.label,
      value:s.value
    }));
    if(srcData.length) makePie('chartSrc','legendSrc',srcData);
    if(protocols.length) makePie('chartProto','legendProto',protocols);
    if(methods.length) makePie('chartMethod','legendMethod',methods);
    const httpsCount=protocols.reduce((s,p)=>s+p.value,0)||total;
    makePie('chartReqProto','legendReqProto',[{label:'HTTPS',value:httpsCount}]);

    const actLabels={block:'Block',challenge:'Challenge',jschallenge:'JS Challenge',
      managed_challenge:'Managed Challenge',allow:'Allow',bypass:'Bypass',skip:'Skip'};
